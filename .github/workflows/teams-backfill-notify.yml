name: Teams Backfill Notification (Microsoft AI / Copilot)

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2026-03-01"
      to_date:
        description: "End date (YYYY-MM-DD)"
        required: true
        default: "2026-04-30"

permissions:
  contents: read

jobs:
  notify-backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Teams payload
        env:
          FROM_DATE: ${{ github.event.inputs.from_date }}
          TO_DATE: ${{ github.event.inputs.to_date }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/build_teams_payload.py backfill \
            --from-date "$FROM_DATE" \
            --to-date "$TO_DATE" \
            --updates-dir docs/updates \
            --output teams-backfill-payload.json

      - name: Notify Teams
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [[ -z "${TEAMS_WEBHOOK_URL:-}" ]]; then
            echo "TEAMS_WEBHOOK_URL is not set."
            exit 1
          fi

          http_code=$(curl -sS -o /tmp/teams_response.txt -w "%{http_code}" -X POST -H "Content-Type: application/json" --data @teams-backfill-payload.json "$TEAMS_WEBHOOK_URL")
          if (( http_code < 200 || http_code >= 300 )); then
            echo "Teams webhook failed (HTTP ${http_code})"
            cat /tmp/teams_response.txt || true
            exit 1
          fi

          echo "Teams webhook accepted (HTTP ${http_code})"
