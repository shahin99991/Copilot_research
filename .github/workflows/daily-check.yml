name: Daily Copilot & VS Code Update Check

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 09:00 JST (00:00 UTC)
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Run update check
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
        run: python scripts/check_updates.py
      - name: Commit and push daily report
        if: steps.check.outputs.has_report == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          git diff --cached --quiet || git commit -m "chore: auto-update $(date -u +'%Y-%m-%d')"
          git push
      - name: Build Teams payload (daily report)
        if: steps.check.outputs.has_report == 'true'
        run: |
          latest_file=$(ls -1 docs/updates/*.md | sort | tail -n 1)
          latest_name=$(basename "$latest_file")
          diff_count=$(grep -E "^- 差分件数:" "$latest_file" | sed -E 's/^- 差分件数:[[:space:]]*//' || true)
          if [[ -z "$diff_count" ]]; then
            diff_count=$(grep -c "^- \*\*URL\*\*:" "$latest_file" || true)
          fi
          report_url="https://github.com/${{ github.repository }}/blob/main/docs/updates/${latest_name}"
          update_titles=$(grep -E '^### ' "$latest_file" | sed -E 's/^### [^ ]+ //' || true)

          UPDATE_TITLES="$update_titles" DIFF_COUNT="$diff_count" LATEST_NAME="$latest_name" REPORT_URL="$report_url" \
          python -c "import json, os; diff=os.getenv('DIFF_COUNT','unknown').strip(); titles=[t.strip() for t in os.getenv('UPDATE_TITLES','').splitlines() if t.strip()]; title_lines='\\n'.join(f'- {t}' for t in titles[:8]) if titles else ('- 本日の更新差分はありませんでした。' if diff=='0' else '- (タイトル抽出なし)'); status='更新あり' if diff!='0' else '差分なし'; text=('Copilot / VS Code 定期チェック結果\\n' + f'- ステータス: {status}\\n' + f'- 差分件数: {diff}\\n' + f\"- レポート: {os.getenv('LATEST_NAME','')}\\n\" + f\"- URL: {os.getenv('REPORT_URL','')}\\n\" + '主な更新:\\n' + title_lines); print(json.dumps({'text': text}, ensure_ascii=False))" > teams-payload.json
      - name: Notify Teams (daily report)
        if: steps.check.outputs.has_report == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [[ -z "${TEAMS_WEBHOOK_URL:-}" ]]; then
            echo "TEAMS_WEBHOOK_URL is not set. Skip Teams notification."
            exit 0
          fi
          curl -sS -X POST -H "Content-Type: application/json" --data @teams-payload.json "$TEAMS_WEBHOOK_URL"
