name: Daily Copilot & VS Code Update Check

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 09:00 JST (00:00 UTC)
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Run update check
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN }}
        run: python scripts/check_updates.py
      - name: Commit and push daily report
        if: steps.check.outputs.has_report == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          git diff --cached --quiet || git commit -m "chore: auto-update $(date -u +'%Y-%m-%d')"
          git push
      - name: Build Teams payload (daily report)
        if: steps.check.outputs.has_report == 'true'
        run: |
          latest_file=$(ls -1 docs/updates/*.md | sort | tail -n 1)
          latest_name=$(basename "$latest_file")
          report_url="https://github.com/${{ github.repository }}/blob/main/docs/updates/${latest_name}"
          python scripts/build_teams_payload.py daily \
            --report-file "$latest_file" \
            --report-url "$report_url" \
            --output teams-payload.json
      - name: Notify Teams (daily report)
        if: steps.check.outputs.has_report == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [[ -z "${TEAMS_WEBHOOK_URL:-}" ]]; then
            echo "TEAMS_WEBHOOK_URL is not set. Skip Teams notification."
            exit 0
          fi
          http_code=$(curl -sS -o /tmp/teams_response.txt -w "%{http_code}" -X POST -H "Content-Type: application/json" --data @teams-payload.json "$TEAMS_WEBHOOK_URL")
          if (( http_code < 200 || http_code >= 300 )); then
            echo "Teams webhook failed (HTTP ${http_code})"
            cat /tmp/teams_response.txt || true
            exit 1
          fi
          echo "Teams webhook accepted (HTTP ${http_code})"
